<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endura Coach Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1a14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #162110;
      border: 1px solid #2a3d22;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: #4caf72;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { width: 20px; height: 20px; }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: #e8f5ec;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #4caf72;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #e8f5ec;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b8f72;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #9ab89f;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: #0f1a14;
      border: 1px solid #2a3d22;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #e8f5ec;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #4caf72;
    }

    input::placeholder { color: #3a5240; }

    .btn {
      width: 100%;
      background: #4caf72;
      color: #0f1a14;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 0.5rem;
    }

    .btn:hover { background: #5dc484; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      background: #2d1212;
      border: 1px solid #5a2020;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #f08080;
      margin-bottom: 1rem;
      display: none;
    }

    .error.visible { display: block; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(15,26,20,0.3);
      border-top-color: #0f1a14;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2L13 8H17L13.5 12L15 18L10 15L5 18L6.5 12L3 8H7L10 2Z" fill="#0f1a14"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Endura</div>
      <div class="logo-sub">Coach Portal</div>
    </div>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to manage your athletes' app settings.</p>

  <div class="error" id="error-msg"></div>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="coach@endura.com" autocomplete="email" />

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />

  <button class="btn" id="login-btn" onclick="handleLogin()">Sign in</button>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ─── REPLACE THIS WITH YOUR FIREBASE CONFIG ───────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyAfxoVdKhaFiKzdISy8OoDdA3aYoO58FG0",
    authDomain: "endura-app-78e40.firebaseapp.com",
    projectId: "endura-app-78e40",
    storageBucket: "endura-app-78e40.firebasestorage.app",
    messagingSenderId: "413555248228",
    appId: "1:413555248228:web:55e295758307831ee0a371"
  };
  // ──────────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Only these Firestore "role" values are allowed into the coach dashboard.
  const ALLOWED_ROLES = ["coach", "admin"];

  // Checks Firestore for a coach/admin role before granting access.
  // Any authenticated user WITHOUT one of these roles is signed out and blocked.
  async function verifyCoachAccess(user, errorEl) {
    try {
      const userDoc = await getDoc(doc(db, "users", user.uid));
      const data = userDoc.exists() ? userDoc.data() : {};
      if (ALLOWED_ROLES.includes(data.role)) {
        window.location.href = "admin-dashboard.html";
      } else {
        await signOut(auth);
        if (errorEl) {
          errorEl.textContent = "This account doesn't have coach access.";
          errorEl.classList.add("visible");
        }
        const btn = document.getElementById("login-btn");
        if (btn) { btn.disabled = false; btn.textContent = "Sign in"; }
      }
    } catch (err) {
      console.error(err);
      await signOut(auth);
      if (errorEl) {
        errorEl.textContent = "Couldn't verify account access. Please try again.";
        errorEl.classList.add("visible");
      }
    }
  }

  // If already logged in, verify role before going to dashboard
  onAuthStateChanged(auth, (user) => {
    if (user) verifyCoachAccess(user, document.getElementById("error-msg"));
  });

  window.handleLogin = async function () {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("login-btn");
    const errorEl = document.getElementById("error-msg");

    errorEl.classList.remove("visible");

    if (!email || !password) {
      errorEl.textContent = "Please enter your email and password.";
      errorEl.classList.add("visible");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged will redirect
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Sign in";
      const messages = {
        "auth/user-not-found": "No account found with that email.",
        "auth/wrong-password": "Incorrect password. Please try again.",
        "auth/invalid-email": "Please enter a valid email address.",
        "auth/too-many-requests": "Too many failed attempts. Please try again later.",
        "auth/invalid-credential": "Incorrect email or password. Please try again.",
      };
      errorEl.textContent = messages[err.code] || "Sign-in failed. Please try again.";
      errorEl.classList.add("visible");
    }
  };

  // Allow Enter key to submit
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") window.handleLogin();
  });
</script>

</body>
</html>
