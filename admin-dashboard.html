<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endura Coach Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1a14;
      color: #e8f5ec;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: #162110;
      border-bottom: 1px solid #2a3d22;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo { display: flex; align-items: center; gap: 10px; }

    .logo-mark {
      width: 30px; height: 30px;
      background: #4caf72;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-mark svg { width: 16px; height: 16px; }

    .logo-text { font-size: 16px; font-weight: 600; color: #e8f5ec; }
    .logo-sub { font-size: 10px; color: #4caf72; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }

    .nav-right { display: flex; align-items: center; gap: 1rem; }

    .coach-badge {
      font-size: 13px; color: #6b8f72;
      background: #0f1a14;
      border: 1px solid #2a3d22;
      border-radius: 20px;
      padding: 4px 12px;
    }

    .btn-signout {
      background: none;
      border: 1px solid #2a3d22;
      border-radius: 6px;
      color: #6b8f72;
      font-size: 13px;
      padding: 5px 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-signout:hover { border-color: #4caf72; color: #4caf72; }

    /* ── Layout ── */
    main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    .page-header p { font-size: 14px; color: #6b8f72; margin-top: 4px; }

    /* ── Add user form ── */
    .add-user-form {
      background: #162110;
      border: 1px solid #2a3d22;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .form-group { flex: 1; min-width: 180px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: #6b8f72; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }

    input[type="text"], input[type="email"] {
      width: 100%;
      background: #0f1a14;
      border: 1px solid #2a3d22;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      color: #e8f5ec;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #4caf72; }
    input::placeholder { color: #3a5240; }

    .btn-add {
      background: #4caf72;
      color: #0f1a14;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-add:hover { background: #5dc484; }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── User list ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #4caf72;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .user-card {
      background: #162110;
      border: 1px solid #2a3d22;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .user-card:hover { border-color: #3a5a30; }

    .user-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      gap: 12px;
    }

    .user-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #1e3328;
      border: 1px solid #2a3d22;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: #4caf72;
      flex-shrink: 0;
    }

    .user-name { font-size: 15px; font-weight: 500; color: #e8f5ec; }
    .user-email { font-size: 12px; color: #6b8f72; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .tile-count {
      font-size: 12px;
      color: #4caf72;
      background: #1e3328;
      border: 1px solid #2a3d22;
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    .chevron {
      color: #3a5240;
      font-size: 18px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .user-card.open .chevron { transform: rotate(180deg); }

    .tile-panel {
      display: none;
      padding: 0 18px 16px;
      border-top: 1px solid #1e3328;
    }
    .user-card.open .tile-panel { display: block; }

    .tile-panel-label {
      font-size: 11px;
      color: #4a6e52;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
      margin: 14px 0 10px;
    }

    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }

    .tile-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f1a14;
      border: 1px solid #2a3d22;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      gap: 8px;
    }
    .tile-toggle:hover { border-color: #3a5a30; }
    .tile-toggle.enabled { background: #1a2e1e; border-color: #3a6642; }

    .tile-name {
      font-size: 13px;
      font-weight: 500;
      color: #9ab89f;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tile-toggle.enabled .tile-name { color: #e8f5ec; }

    .tile-icon { font-size: 16px; }

    /* Toggle switch */
    .switch {
      width: 32px; height: 18px;
      background: #2a3d22;
      border-radius: 9px;
      position: relative;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .switch::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #4a6e52;
      transition: transform 0.2s, background 0.2s;
    }
    .tile-toggle.enabled .switch { background: #4caf72; }
    .tile-toggle.enabled .switch::after { transform: translateX(14px); background: #0f1a14; }

    .save-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-save {
      background: #4caf72;
      color: #0f1a14;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #5dc484; }

    .btn-remove {
      background: none;
      border: 1px solid #3a2020;
      border-radius: 8px;
      color: #8b5050;
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
      margin-left: auto;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-remove:hover { border-color: #c05050; color: #e08080; }

    .save-status { font-size: 12px; color: #4caf72; opacity: 0; transition: opacity 0.3s; }
    .save-status.visible { opacity: 1; }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #4a6e52;
    }
    .empty-state p { font-size: 14px; margin-top: 8px; }

    .loading { text-align: center; padding: 2rem; color: #4a6e52; font-size: 14px; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e3328;
      border: 1px solid #3a6642;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #a0d4aa;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" fill="none"><path d="M10 2L13 8H17L13.5 12L15 18L10 15L5 18L6.5 12L3 8H7L10 2Z" fill="#0f1a14"/></svg>
    </div>
    <div>
      <div class="logo-text">Endura</div>
      <div class="logo-sub">Coach Portal</div>
    </div>
  </div>
  <div class="nav-right">
    <span class="coach-badge" id="coach-email">Loading…</span>
    <button class="btn-signout" onclick="handleSignOut()">Sign out</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Athlete tile settings</h1>
    <p>Choose which tiles each athlete sees in their Endura app.</p>
  </div>

  <!-- Add athlete -->
  <div class="add-user-form">
    <div class="form-group">
      <label for="new-name">Athlete name</label>
      <input type="text" id="new-name" placeholder="e.g. Anna Smith" />
    </div>
    <div class="form-group">
      <label for="new-uid">Athlete user ID</label>
      <input type="text" id="new-uid" placeholder="Firebase UID or email" />
    </div>
    <button class="btn-add" id="add-btn" onclick="addUser()">+ Add athlete</button>
  </div>

  <div class="section-label">Your athletes</div>
  <div id="user-list"><div class="loading">Loading athletes…</div></div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteField, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ─── REPLACE THIS WITH YOUR FIREBASE CONFIG ───────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyAfxoVdKhaFiKzdISy8OoDdA3aYoO58FG0",
    authDomain: "endura-app-78e40.firebaseapp.com",
    projectId: "endura-app-78e40",
    storageBucket: "endura-app-78e40.firebasestorage.app",
    messagingSenderId: "413555248228",
    appId: "1:413555248228:web:55e295758307831ee0a371"
  };
  // ──────────────────────────────────────────────────────────────────────────

  // All available tiles — add/remove from this list to match your app
  const ALL_TILES = [
    { id: "steps",       label: "Steps",        icon: "👣" },
    { id: "sauna",       label: "Sauna",         icon: "🧖" },
    { id: "coldPlunge",  label: "Cold plunge",   icon: "🧊" },
    { id: "meditation",  label: "Meditation",    icon: "🧘" },
    { id: "sleep",       label: "Sleep",         icon: "😴" },
    { id: "nutrition",   label: "Nutrition",     icon: "🥗" },
    { id: "workout",     label: "Workout",       icon: "🏋️" },
    { id: "hrv",         label: "HRV",           icon: "💓" },
  ];

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentCoachUid = null;

  // Guard: redirect to login if not authenticated
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "admin.html";
      return;
    }
    currentCoachUid = user.uid;
    document.getElementById("coach-email").textContent = user.email;
    listenToAthletes();
  });

  // ── Real-time listener on the coach's athlete list ──
  function listenToAthletes() {
    const coachRef = doc(db, "coachSettings", currentCoachUid);
    onSnapshot(coachRef, (snap) => {
      const data = snap.exists() ? snap.data() : {};
      renderAthleteList(data.athletes || {});
    });
  }

  // ── Render the list of athletes ──
  function renderAthleteList(athletes) {
    const container = document.getElementById("user-list");
    const keys = Object.keys(athletes);

    if (keys.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div style="font-size:2rem;">👤</div>
          <p>No athletes yet. Add one above to get started.</p>
        </div>`;
      return;
    }

    container.innerHTML = keys.map(uid => {
      const athlete = athletes[uid];
      const tiles = athlete.tiles || defaultTiles();
      const enabledCount = Object.values(tiles).filter(Boolean).length;
      const initials = (athlete.name || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2);

      return `
        <div class="user-card" id="card-${uid}">
          <div class="user-header" onclick="toggleCard('${uid}')">
            <div class="user-info">
              <div class="avatar">${initials}</div>
              <div>
                <div class="user-name">${escHtml(athlete.name || "Unnamed")}</div>
                <div class="user-email">${escHtml(uid)}</div>
              </div>
            </div>
            <span class="tile-count">${enabledCount} of ${ALL_TILES.length} tiles on</span>
            <span class="chevron">⌄</span>
          </div>
          <div class="tile-panel">
            <div class="tile-panel-label">Visible tiles</div>
            <div class="tile-grid" id="tiles-${uid}">
              ${ALL_TILES.map(tile => {
                const on = tiles[tile.id] !== false;
                return `
                  <div class="tile-toggle ${on ? 'enabled' : ''}" id="toggle-${uid}-${tile.id}" onclick="toggleTile('${uid}', '${tile.id}')">
                    <span class="tile-name"><span class="tile-icon">${tile.icon}</span>${tile.label}</span>
                    <div class="switch"></div>
                  </div>`;
              }).join("")}
            </div>
            <div class="save-row">
              <button class="btn-save" onclick="saveAthleteSettings('${uid}')">Save changes</button>
              <span class="save-status" id="saved-${uid}">✓ Saved</span>
              <button class="btn-remove" onclick="removeAthlete('${uid}', '${escHtml(athlete.name || uid)}')">Remove athlete</button>
            </div>
          </div>
        </div>`;
    }).join("");
  }

  // ── Toggle card open/closed ──
  window.toggleCard = function(uid) {
    document.getElementById(`card-${uid}`).classList.toggle("open");
  };

  // ── Toggle a tile on/off (client-side only until Save) ──
  window.toggleTile = function(uid, tileId) {
    const el = document.getElementById(`toggle-${uid}-${tileId}`);
    el.classList.toggle("enabled");
    // Update the tile count badge
    const card = document.getElementById(`card-${uid}`);
    const enabledCount = card.querySelectorAll(".tile-toggle.enabled").length;
    card.querySelector(".tile-count").textContent = `${enabledCount} of ${ALL_TILES.length} tiles on`;
  };

  // ── Save settings for one athlete to Firestore ──
  window.saveAthleteSettings = async function(uid) {
    const card = document.getElementById(`card-${uid}`);
    const tiles = {};
    ALL_TILES.forEach(tile => {
      tiles[tile.id] = card.querySelector(`#toggle-${uid}-${tile.id}`).classList.contains("enabled");
    });

    try {
      const coachRef = doc(db, "coachSettings", currentCoachUid);
      await updateDoc(coachRef, { [`athletes.${uid}.tiles`]: tiles });
      const statusEl = document.getElementById(`saved-${uid}`);
      statusEl.classList.add("visible");
      setTimeout(() => statusEl.classList.remove("visible"), 2000);
    } catch (err) {
      showToast("Failed to save — please try again.");
      console.error(err);
    }
  };

  // ── Add a new athlete ──
  window.addUser = async function() {
    const name = document.getElementById("new-name").value.trim();
    const uid = document.getElementById("new-uid").value.trim();
    if (!name || !uid) { showToast("Please enter both a name and a user ID."); return; }

    const btn = document.getElementById("add-btn");
    btn.disabled = true;
    btn.textContent = "Adding…";

    try {
      const coachRef = doc(db, "coachSettings", currentCoachUid);
      const snap = await getDoc(coachRef);
      const existing = snap.exists() ? (snap.data().athletes || {}) : {};

      if (existing[uid]) { showToast("That athlete is already in your list."); return; }

      await setDoc(coachRef, {
        athletes: { ...existing, [uid]: { name, tiles: defaultTiles() } }
      }, { merge: true });

      document.getElementById("new-name").value = "";
      document.getElementById("new-uid").value = "";
      showToast(`${name} added.`);
    } catch (err) {
      showToast("Failed to add athlete — please try again.");
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = "+ Add athlete";
    }
  };

  // ── Remove an athlete ──
  window.removeAthlete = async function(uid, name) {
    if (!confirm(`Remove ${name} from your athlete list?`)) return;
    try {
      const coachRef = doc(db, "coachSettings", currentCoachUid);
      await updateDoc(coachRef, { [`athletes.${uid}`]: deleteField() });
      showToast(`${name} removed.`);
    } catch (err) {
      showToast("Failed to remove — please try again.");
      console.error(err);
    }
  };

  // ── Sign out ──
  window.handleSignOut = async function() {
    await signOut(auth);
    window.location.href = "admin.html";
  };

  // ── Helpers ──
  function defaultTiles() {
    return Object.fromEntries(ALL_TILES.map(t => [t.id, true]));
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
  }
</script>

</body>
</html>
